---
experiment_id: ntu60_xsub_joint_finetune

dataset:
    benchmark: xsub
    modality: joint
    name: nturgb+d
    pre_transform: true
    seed: 42
    type: basic_dataset
    label_ratio: 1.0

batch_handler:
    batch_size: 256
    type: basic_batch_handler

losses:
list:
    - name: clf
      weight: 1
reduction: sum

model:
    pre_trained: weights/ntu60_xsub_joint.pt
    backbone:
        type: st_gcn_model
        params:
          dropout: 0.5

n_epochs: 50
    
optimizer: 
  type: sgd
  lr: 0.2
  nesterov: True
  momentum: 0.9
  weight_decay: 0.0001

scheduler:
    params:
        gamma: 0.1
        milestones: [30,40]
    type: MultiStepLR

validation: true